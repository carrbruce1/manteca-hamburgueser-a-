<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="title">Manteca Burger</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="icon" href="/cliente-1/img/trans.png" type="image/png">

  <!-- Fuente -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <!-- Iconos -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
    }
  </style>
</head>

<body class="bg-[#1a1a1a] text-white">

  <!-- HERO -->
  <section class="min-h-[75vh] flex items-center justify-center text-center relative overflow-hidden bg-[#1a1a1a]">

    <div class="absolute w-[500px] h-[500px] bg-orange-500/20 rounded-full blur-3xl"></div>

    <div class="relative z-10 px-6 max-w-xl">

      <h1 id="nombre" class="hidden"></h1>

      <!-- LOGO -->
      <img src="img/trans.png" 
           class="mx-auto w-56 md:w-72 object-contain drop-shadow-[0_10px_25px_rgba(0,0,0,0.7)]">

      <!-- BOTÓN -->
      <a id="btnHero"
         target="_blank"
         class="mt-6 inline-flex items-center gap-3 
                bg-orange-500 hover:bg-orange-600 
                text-white
                px-6 py-3 rounded-xl 
                shadow-lg hover:shadow-orange-500/30
                transform hover:scale-105 active:scale-95
                transition duration-300">

        <span class="font-medium">Pedir ahora</span>
        <i class="fa-solid fa-arrow-right"></i>

      </a>

    </div>

  </section>

  <!-- MENÚ -->
  <section class="px-6 py-10">

    <h2 class="text-2xl font-bold mb-6 text-orange-400">
      Menú <i class="fa-solid fa-burger ml-2"></i>
    </h2>

    <div id="menu" class="grid sm:grid-cols-2 gap-6"></div>

  </section>

  <!-- BOTÓN WHATSAPP -->
  <a id="btnWsp"
     target="_blank"
     class="fixed bottom-6 right-6 w-14 h-14 flex items-center justify-center 
            bg-green-500 text-white rounded-full shadow-lg 
            hover:bg-green-600 transform hover:scale-110 active:scale-95 transition">

    <i class="fa-brands fa-whatsapp text-2xl"></i>

  </a>

  <!-- SCRIPTS -->
  <script src="js/config.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
